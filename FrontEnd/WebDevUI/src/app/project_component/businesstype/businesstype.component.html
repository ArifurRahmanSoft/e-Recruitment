<div class="col-12 p-0 m-0">
    <div class="d-flex justify-content-center p-0 m-0">
        <div class="col-12 pl-0 pr-0 pb-0 pt-1 m-0" style="background-color: #fff;">

            <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 p-0 m-0 card "
                style="border: 1px solid #ccc;">

                <div class="card-header pt-0 pb-0 pl-2 pr-0 clearfix"
                    style="height: 30px; border: 1px solid #ccc; background-color: #138496;">
                    <h4 class="myCustomTitle pt-1"><i style="font-size: 14px;" class="fa fa-table"></i> Business Type
                        {{cmnEntity.isShow?'List':'Entry'}}
                    </h4>
                    <common-button-top #cmnsrv (executeSubmit)="cmnbtnAction($event)" [cmnEntity]="cmnEntity"
                        [btnForm]="businessTypeForm"></common-button-top>
                </div>

                <!-- Entry Form -->
                <div *ngIf="!cmnEntity.isShow" class="col-md-12 pl-0 pr-0 pt-2 pb-0 m-0 table-primary">
                    <form id="subForm" [formGroup]="businessTypeForm" #f="ngForm" class="form-horizontal">
                        <div class="row p-0 m-0">
                            <div class="col-xl-4 col-lg-4 col-md-12 col-sm-12 col-xs-12 m-0 p-0" style="float: left;">
                                <div class="form-group clearfix">
                                    <label class="control-label col-sm-2 ml-4 p-0 m-0 pt-1" for="name"
                                        style="float: left;">Business Name: </label>
                                    <div class="col-sm-9 p-0 m-0" style="float: left;">
                                        <div style="padding: 0px; width: 96.5%; font-size: 13px; float: left;">
                                            <input formControlName="name" type="text"
                                                class="form-control form-control-sm input-sm input-sm-*" id="name"
                                                placeholder="Enter Business Type Name" name="name">
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="col-xl-6 col-lg-4 col-md-12 col-sm-12 col-xs-12 m-0 p-0" style="float: left;">
                                <div class="form-group clearfix">
                                    <label class="control-label col-sm-2 ml-4 p-0 m-0 pt-1" for="details"
                                        style="float: left;">Business Details: </label>
                                    <div class="col-sm-9 p-0 m-0" style="float: left;">
                                        <div style="padding: 0px; width: 96.5%; font-size: 13px; float: left;">
                                            <textarea formControlName="details" type="text"
                                                class="form-control form-control-sm input-sm input-sm-*" id="details"
                                                placeholder="Enter Business Type details" name="details"
                                                cols="2"></textarea>

                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </form>
                </div>
            </div>

            <!-- List-->
            <div *ngIf="cmnEntity.isShow" class="card-body pl-0 pr-4 pt-2"
                style="min-height: 460px; margin-bottom: -20px;">

                <div class="row">
                    <div class="col-md-12">
                        <pager-top (setPage)="getListByPage($event)" (sendList)="businessTypeList=$event"
                            [pageSize]="pageSize" [IsSearchOnServer]="true" [responseTag]="responseTag"
                            [apiUrl]="_listByPageUrl">
                        </pager-top>
                    </div>
                </div>

                <div class="row pr-2">
                    <div class="col-md-12">
                        <div class="table-responsive" style="height:700px; overflow:auto;">
                            <table id="table" class="table table-striped table-sm table-bordered p-0">
                                <thead class="table-dark"
                                    style="position:sticky; top:-1.5px; z-index:1; cursor: pointer; text-align: left;">
                                    <tr class="banglaTitle myCustomTableHeaderText">
                                        <th scope="col">S/L</th>
                                        <th scope="col">Name</th>
                                        <th scope="col">Details</th>
                                         <th scope="col">Action</th>
                                    </tr>
                                </thead>
                                <tbody class="banglaTitle p-0" style="padding-bottom: 0px; margin-bottom: 0px;">
                                    <tr *ngFor="let item of this.businessTypeList;let sl = index">
                                        <td class="pl-2 pr-1 pt-1 pb-1">{{sl+1}}</td>
                                        <td class="pl-2 pr-1 pt-1 pb-1">{{item.name}}</td>
                                        <td class="pl-2 pr-1 pt-1 pb-1">{{item.details}}</td>

                                           <td class="pl-2 pr-1 pt-1 pb-1" style="text-align: center; width: 12%;">
                                                <common-button-option #cmnbuttonoption style="float: left;"
                                                    (executeSubmit)="cmnbtnAction($event)" [cmnEntity]="cmnEntity"
                                                    [model]="item" [itemName]="item.businessOid">
                                                </common-button-option>
                                               
                                                </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="row pr-2">
                    <div class="col-md-12">
                        <pager-bottom #cmnpager (setPage)="getListByPage($event)" (sendList)="businessTypeList=$event"
                            [responseTag]="responseTag" [apiUrl]="_listByPageUrl"></pager-bottom>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
